name: Deploy Frontend to Railway

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build frontend
        run: npm run build
        env:
          VITE_API_URL: https://appointment-guard-production.up.railway.app
      
      - name: Deploy to Railway via API
        run: |
          # Login to Railway with API token
          echo "${{ secrets.RAILWAY_API_TOKEN }}" | railway login --token -
          
          # Link to existing project
          railway link --project ${{ secrets.RAILWAY_PROJECT_ID }}
          
          # Deploy the built frontend
          railway up --detach
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
